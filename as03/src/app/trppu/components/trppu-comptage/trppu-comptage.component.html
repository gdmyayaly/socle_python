<div class="comptage-container">

  <div class="comptage-header">
    <mat-icon class="header-icon">analytics</mat-icon>
    <h3>Comptages manuels</h3>
    <span class="dirty-badge" *ngIf="isDirty">
      <mat-icon>edit</mat-icon> Modifié
    </span>
  </div>

  <!-- Tableau avec ligne d'ajout intégrée -->
  <table mat-table [dataSource]="comptages">

    <ng-container matColumnDef="trafic">
      <th mat-header-cell *matHeaderCellDef>Trafic</th>
      <td mat-cell *matCellDef="let row">
        <span class="trafic-code">{{ row.trafic.code }}</span>
        {{ row.trafic.libelle }}
      </td>
      <td mat-footer-cell *matFooterCellDef>
        <mat-form-field appearance="outline" class="inline-field">
          <mat-select [(ngModel)]="newTraficId" placeholder="Choisir un trafic">
            <mat-option *ngFor="let t of availableTrafics" [value]="t.id">
              {{ t.code }} — {{ t.libelle }}
            </mat-option>
          </mat-select>
        </mat-form-field>
      </td>
    </ng-container>

    <ng-container matColumnDef="valeur">
      <th mat-header-cell *matHeaderCellDef>Valeur</th>
      <td mat-cell *matCellDef="let row">
        <input type="number" class="inline-input"
               [ngModel]="row.valeur"
               (ngModelChange)="onValeurChange(row, $event)"
               min="0" />
      </td>
      <td mat-footer-cell *matFooterCellDef>
        <input type="number" class="inline-input"
               [(ngModel)]="newValeur"
               min="0"
               placeholder="0" />
      </td>
    </ng-container>

    <ng-container matColumnDef="actions">
      <th mat-header-cell *matHeaderCellDef>Actions</th>
      <td mat-cell *matCellDef="let row">
        <button mat-icon-button color="warn" (click)="onRemove(row)" aria-label="Supprimer">
          <mat-icon>delete</mat-icon>
        </button>
      </td>
      <td mat-footer-cell *matFooterCellDef>
        <button mat-icon-button color="primary" [disabled]="!canAdd" (click)="onAdd()" aria-label="Ajouter">
          <mat-icon>add_circle</mat-icon>
        </button>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
    <tr mat-footer-row *matFooterRowDef="displayedColumns" class="add-footer-row"></tr>
  </table>

</div>
