<div class="param-site">
  <app-trppu-select-site (siteSelected)="onSiteSelected($event)"></app-trppu-select-site>
</div>

<div class="overlay-wrapper">
  <div class="overlay-block" *ngIf="!selectedSite">
    <span>Sélectionnez un site pour accéder aux paramètres.</span>
  </div>

  <div class="param-sections" [class.disabled-content]="!selectedSite">
    <app-trppu-periode-neutraliser
      [siteId]="selectedSite ? selectedSite.codeRoc : null"
      (periodesChange)="onPeriodesNeutraliseesChange($event)">
    </app-trppu-periode-neutraliser>

    <app-trppu-variation-trafic
      [siteId]="selectedSite ? selectedSite.codeRoc : null"
      (variationsChange)="onVariationsChange($event)">
    </app-trppu-variation-trafic>

    <app-trppu-neutralisation-peak
      [siteId]="selectedSite ? selectedSite.codeRoc : null"
      (neutralisationsChange)="onNeutralisationsPeakChange($event)">
    </app-trppu-neutralisation-peak>

    <app-trppu-neutralisation-secondaire
      [siteId]="selectedSite ? selectedSite.codeRoc : null"
      (neutralisationsChange)="onNeutralisationsSecondairesChange($event)">
    </app-trppu-neutralisation-secondaire>

    <app-trppu-produit-a-exclure
      [siteId]="selectedSite ? selectedSite.codeRoc : null"
      (produitsChange)="onProduitsChange($event)">
    </app-trppu-produit-a-exclure>

    <div class="param-actions">
      <button mat-raised-button
              color="primary"
              class="btn-validate"
              [disabled]="!selectedSite"
              (click)="onValidate()">
        <mat-icon>check_circle</mat-icon>
        Valider les paramètres
      </button>
      <span class="validated-info" *ngIf="lastValidatedPayload">
        <mat-icon>task_alt</mat-icon>
        Paramètres consolidés — prêts pour soumission
      </span>
    </div>
  </div>
</div>
